version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pulsemind-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pulsemind_secure_2024
      POSTGRES_DB: pulsemind_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pulsemind-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:pulsemind_secure_2024@postgres:5432/pulsemind_ai
      JWT_SECRET: pulsemind-jwt-secret-production-2024
      JWT_REFRESH_SECRET: pulsemind-refresh-secret-production-2024
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pulsemind-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
