services:
  - type: web
    name: antigravity-erp-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node -e "try{require('child_process').execSync('node ./node_modules/prisma/build/index.js db push --accept-data-loss',{stdio:'inherit'})}catch(e){console.log('DB push skipped:',e.message)}" && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
