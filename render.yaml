services:
  - type: web
    name: antigravity-erp-backend
    env: node
    plan: free
    region: singapore # You can change this or let Render decide
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false # You will provide this in the Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false # You will set this to your Vercel URL
